<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ-панель — PHOTOSYRNIK</title>
    <link rel="manifest" href="manifest.json" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f6f4; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }

        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 2px solid #000; margin-bottom: 32px; }
        .admin-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 0.08em; }
        .admin-header a { color: #000; text-decoration: none; padding: 8px 20px; border: 1px solid #000; border-radius: 30px; }

        .admin-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; border-bottom: 1px solid #ddd; padding-bottom: 16px; }
        .admin-tab { padding: 10px 24px; background: none; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 18px; cursor: pointer; color: #999; border-radius: 30px; transition: all 0.3s ease; }
        .admin-tab.active { color: #fff; background: #000; }

        .admin-panel { display: none; animation: fadeIn 0.3s ease; }
        .admin-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 20px rgba(0,0,0,0.04); margin-bottom: 24px; border: 1px solid #eee; }
        .card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; margin-bottom: 16px; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 4px; color: #333; }
        .form-group input, .form-group select { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; }

        .btn-admin { padding: 12px 32px; background: #000; color: #fff; border: none; border-radius: 50px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; cursor: pointer; transition: all 0.3s ease; }
        .btn-admin:hover { background: #333; }
        .btn-danger { background: #e53935; }
        .btn-danger:hover { background: #c62828; }

        .client-list { list-style: none; padding: 0; }
        .client-list li { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
        .client-list li:last-child { border-bottom: none; }
        .client-name { font-weight: 600; }
        .client-pass { color: #999; font-size: 13px; }

        .upload-preview { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; margin-top: 12px; }
        .upload-preview img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; border: 1px solid #eee; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
        .stat-item { background: #f8f6f4; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-number { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: #000; }
        .stat-label { font-size: 13px; color: #888; }

        .admin-message { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; display: none; }
        .admin-message.success { display: block; background: #e8f5e9; color: #2e7d32; }
        .admin-message.error { display: block; background: #ffebee; color: #c62828; }

        @media (max-width: 768px) { .admin-header { flex-direction: column; gap: 16px; } }
    </style>
</head>
<body>
    <div class="container">
        <header class="admin-header">
            <h1>⚙️ PHOTOSYRNIK — Админ-панель</h1>
            <a href="index.html">Вернуться на сайт</a>
        </header>

        <div id="adminMessage" class="admin-message"></div>

        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="clients">👥 Клиенты</button>
            <button class="admin-tab" data-tab="upload">📤 Загрузить</button>
            <button class="admin-tab" data-tab="analytics">📊 Аналитика</button>
            <button class="admin-tab" data-tab="settings">⚙️ Настройки</button>
        </div>

        <!-- Клиенты -->
        <div class="admin-panel active" id="panel-clients">
            <div class="card">
                <h3>📋 Список клиентов</h3>
                <ul class="client-list" id="clientList">
                    <li><span class="client-name">Иван Петров</span> <span class="client-pass">пароль: auto123</span> <button class="btn-admin btn-danger" style="padding:4px 12px; font-size:12px;" onclick="deleteClient(this)">×</button></li>
                    <li><span class="client-name">Анна Смирнова</span> <span class="client-pass">пароль: bmw2026</span> <button class="btn-admin btn-danger" style="padding:4px 12px; font-size:12px;" onclick="deleteClient(this)">×</button></li>
                </ul>
            </div>
            <div class="card">
                <h3>➕ Добавить клиента</h3>
                <form id="addClientForm">
                    <div class="form-group">
                        <label for="clientName">Имя клиента</label>
                        <input type="text" id="clientName" placeholder="Например: Елена Виноградова" required />
                    </div>
                    <div class="form-group">
                        <label for="clientPassword">Пароль</label>
                        <input type="text" id="clientPassword" placeholder="Придумайте пароль" required />
                    </div>
                    <button type="submit" class="btn-admin">Добавить клиента</button>
                </form>
            </div>
        </div>

        <!-- Загрузить -->
        <div class="admin-panel" id="panel-upload">
            <div class="card">
                <h3>📤 Загрузить фото или PDF</h3>
                <form id="uploadForm">
                    <div class="form-group">
                        <label for="uploadClient">Выберите клиента</label>
                        <select id="uploadClient" required>
                            <option value="">— Выберите —</option>
                            <option value="Иван Петров">Иван Петров</option>
                            <option value="Анна Смирнова">Анна Смирнова</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="uploadType">Тип файла</label>
                        <select id="uploadType" required>
                            <option value="photos">📸 Фото (галерея)</option>
                            <option value="journal">📖 Журнал (PDF)</option>
                            <option value="portfolio">🖼️ Портфолио (общее)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="uploadFiles">Выберите файлы</label>
                        <input type="file" id="uploadFiles" multiple accept=".jpg,.jpeg,.png,.pdf" required />
                    </div>
                    <div class="upload-preview" id="uploadPreview"></div>
                    <button type="submit" class="btn-admin">📤 Загрузить</button>
                </form>
            </div>
        </div>

        <!-- Аналитика -->
        <div class="admin-panel" id="panel-analytics">
            <div class="card">
                <h3>📊 Статистика сайта</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-number" id="statClients">3</div>
                        <div class="stat-label">Всего клиентов</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="statPhotos">24</div>
                        <div class="stat-label">Загружено фото</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="statJournals">2</div>
                        <div class="stat-label">PDF-журналов</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="statVisits">147</div>
                        <div class="stat-label">Посещений сайта</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Настройки -->
        <div class="admin-panel" id="panel-settings">
            <div class="card">
                <h3>⚙️ Настройки сайта</h3>
                <form id="settingsForm">
                    <div class="form-group">
                        <label for="siteTitle">Название сайта</label>
                        <input type="text" id="siteTitle" value="PHOTOSYRNIK" />
                    </div>
                    <div class="form-group">
                        <label for="sitePhone">Телефон</label>
                        <input type="text" id="sitePhone" value="+7 (911) 173-94-99" />
                    </div>
                    <div class="form-group">
                        <label for="siteEmail">Email</label>
                        <input type="email" id="siteEmail" value="photosyrnik@mail.ru" />
                    </div>
                    <div class="form-group">
                        <label for="siteInstagram">Instagram</label>
                        <input type="text" id="siteInstagram" value="https://instagram.com/photosyrnik" />
                    </div>
                    <div class="form-group">
                        <label for="siteTelegram">Telegram</label>
                        <input type="text" id="siteTelegram" value="https://t.me/dj_milena" />
                    </div>
                    <button type="submit" class="btn-admin">💾 Сохранить настройки</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // === Табы ===
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
                document.getElementById('panel-' + this.dataset.tab).classList.add('active');
            });
        });

        function showMessage(text, type) {
            const el = document.getElementById('adminMessage');
            el.textContent = text;
            el.className = 'admin-message ' + type;
            setTimeout(() => el.className = 'admin-message', 4000);
        }

        // === Добавить клиента ===
        document.getElementById('addClientForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('clientName').value.trim();
            const password = document.getElementById('clientPassword').value.trim();
            if (name && password) {
                const list = document.getElementById('clientList');
                const li = document.createElement('li');
                li.innerHTML = `<span class="client-name">${name}</span> <span class="client-pass">пароль: ${password}</span> <button class="btn-admin btn-danger" style="padding:4px 12px; font-size:12px;" onclick="deleteClient(this)">×</button>`;
                list.appendChild(li);
                const select = document.getElementById('uploadClient');
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
                document.getElementById('statClients').textContent = list.children.length;
                this.reset();
                showMessage('Клиент добавлен!', 'success');
            }
        });

        function deleteClient(btn) {
            const li = btn.closest('li');
            const name = li.querySelector('.client-name').textContent;
            li.remove();
            const select = document.getElementById('uploadClient');
            for (let opt of select.options) {
                if (opt.value === name) { opt.remove(); break; }
            }
            document.getElementById('statClients').textContent = document.getElementById('clientList').children.length;
            showMessage('Клиент удалён', 'success');
        }

        // === Превью загрузки ===
        document.getElementById('uploadFiles').addEventListener('change', function() {
            const preview = document.getElementById('uploadPreview');
            preview.innerHTML = '';
            for (let file of this.files) {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        preview.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                } else {
                    const div = document.createElement('div');
                    div.textContent = '📄 ' + file.name;
                    div.style.cssText = 'padding:8px; background:#f0f0f0; border-radius:4px; text-align:center; font-size:12px;';
                    preview.appendChild(div);
                }
            }
        });

        // === Загрузка ===
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const files = document.getElementById('uploadFiles').files;
            const client = document.getElementById('uploadClient').value;
            const type = document.getElementById('uploadType').value;
            if (files.length === 0) { showMessage('Выберите файлы', 'error'); return; }
            if (!client) { showMessage('Выберите клиента', 'error'); return; }
            showMessage('✅ Загружено ' + files.length + ' файлов для ' + client + ' (' + type + ')', 'success');
            document.getElementById('uploadPreview').innerHTML = '';
            this.reset();
        });

        // === Настройки ===
        document.getElementById('settingsForm').addEventListener('submit', function(e) {
            e.preventDefault();
            showMessage('✅ Настройки сохранены!', 'success');
        });

        // === Статистика ===
        document.getElementById('statClients').textContent = document.getElementById('clientList').children.length;
    </script>
</body>
</html>
