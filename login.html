<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход — PHOTOSYRNIK</title>
    <link rel="manifest" href="manifest.json" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="flower flower-1"></div>
    <div class="flower flower-2"></div>
    <div class="flower flower-3"></div>

    <header class="header">
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo">PHOTOSYRNIK</a>
                <nav class="nav">
                    <a href="about.html">О нас</a>
                    <a href="portfolio.html">Портфолио</a>
                    <a href="prices.html">Цены</a>
                    <a href="contacts.html">Контакты</a>
                    <a href="login.html" class="nav-login">Войти</a>
                </nav>
                <button class="burger" aria-label="Меню">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <section class="login-section">
            <div class="container">
                <div class="login-box">
                    <h2>Вход в личный кабинет</h2>
                    <p class="login-subtitle">Введите пароль, который мы вам выдали</p>
                    <form id="loginForm" class="login-form">
                        <div class="form-group">
                            <input type="password" id="passwordInput" placeholder="Введите пароль" required />
                        </div>
                        <button type="submit" class="btn btn-primary">Войти</button>
                    </form>
                    <p id="loginError" class="login-error" style="display: none;">Неверный пароль</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <span class="footer-copy">© 2026 PHOTOSYRNIK</span>
                <div class="footer-socials">
                    <a href="https://instagram.com/photosyrnik" target="_blank">Instagram</a>
                    <a href="https://t.me/dj_milena" target="_blank">Telegram</a>
                    <a href="mailto:photosyrnik@mail.ru">Email</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('passwordInput').value.trim();
            if (password === '') {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('loginError').textContent = 'Введите пароль';
                return;
            }
            window.location.href = 'private/client.html?client=' + encodeURIComponent(password);
        });
    </script>
</body>
</html>
