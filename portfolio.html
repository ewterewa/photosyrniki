<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Портфолио — PHOTOSYRNIK</title>
    <link rel="manifest" href="manifest.json" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="flower flower-1"></div>
    <div class="flower flower-2"></div>
    <div class="flower flower-3"></div>

    <header class="header">
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo">PHOTOSYRNIK</a>
                <nav class="nav">
                    <a href="about.html">О нас</a>
                    <a href="portfolio.html">Портфолио</a>
                    <a href="prices.html">Цены</a>
                    <a href="contacts.html">Контакты</a>
                    <a href="login.html" class="nav-login">Войти</a>
                </nav>
                <button class="burger" aria-label="Меню">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <section class="page-hero">
            <div class="container">
                <h1 class="page-title">Портфолио</h1>
                <p class="page-subtitle">Наши лучшие работы</p>
            </div>
        </section>

        <section class="portfolio-section">
            <div class="container">
                <div class="portfolio-grid" id="portfolioGrid"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <span class="footer-copy">© 2026 PHOTOSYRNIK</span>
                <div class="footer-socials">
                    <a href="https://instagram.com/photosyrnik" target="_blank">Instagram</a>
                    <a href="https://t.me/dj_milena" target="_blank">Telegram</a>
                    <a href="mailto:photosyrnik@mail.ru">Email</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        // ============================================================
        // ПОРТФОЛИО — ПОКАЗЫВАЕМ РЕАЛЬНЫЕ ФОТО ИЗ localStorage
        // ============================================================
        const grid = document.getElementById('portfolioGrid');

        function renderPortfolio() {
            // Получаем сохранённые фото из localStorage
            const portfolio = JSON.parse(localStorage.getItem('photosyrnik_portfolio') || '[]');
            
            console.log('📸 Загружено фото из localStorage:', portfolio.length);

            if (portfolio.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:#999; border:2px dashed #ddd; border-radius:12px;">
                        <p style="font-size:18px; margin-bottom:8px;">🖼️ Портфолио пока пусто</p>
                        <p style="font-size:14px;">Загрузите фото через админ-панель</p>
                    </div>
                `;
                return;
            }

            // Показываем каждое фото
            grid.innerHTML = portfolio.map((item, index) => `
                <div class="portfolio-item" style="position:relative; overflow:hidden; border-radius:8px; border:1px solid #eee;">
                    <div style="width:100%; height:280px; background-image: url('${item.link}'); background-size: cover; background-position: center; transition: transform 0.4s ease;"></div>
                    <div style="padding:12px 16px; background:#fff;">
                        <h3 style="font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:0.06em;">${item.name || 'Фото'}</h3>
                    </div>
                </div>
            `).join('');

            // Обновляем счётчик в админке
            document.getElementById('statPortfolio').textContent = portfolio.length;
        }

        // Запускаем отображение
        renderPortfolio();

        // Слушаем изменения в localStorage (если админка обновила данные)
        window.addEventListener('storage', function(e) {
            if (e.key === 'photosyrnik_portfolio') {
                renderPortfolio();
            }
        });
    </script>
</body>
</html>
