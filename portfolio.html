<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Портфолио — PHOTOSYRNIK</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .portfolio-item {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #eee;
            transition: transform 0.3s ease;
            background: #fff;
        }
        .portfolio-item:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        .portfolio-img {
            width: 100%;
            height: 280px;
            background-size: cover;
            background-position: center;
            background-color: #f0f0f0;
        }
        .portfolio-info {
            padding: 12px 16px;
        }
        .portfolio-info h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 0.06em;
        }
        .empty-portfolio {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            color: #999;
            border: 2px dashed #ddd;
            border-radius: 12px;
        }
        .empty-portfolio p { font-size: 18px; margin-bottom: 8px; }
        .empty-portfolio span { font-size: 14px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo">PHOTOSYRNIK</a>
                <nav class="nav">
                    <a href="about.html">О нас</a>
                    <a href="portfolio.html">Портфолио</a>
                    <a href="prices.html">Цены</a>
                    <a href="contacts.html">Контакты</a>
                    <a href="login.html" class="nav-login">Войти</a>
                </nav>
                <button class="burger" aria-label="Меню">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <section class="page-hero">
            <div class="container">
                <h1 class="page-title">Портфолио</h1>
                <p class="page-subtitle">Наши лучшие работы</p>
            </div>
        </section>

        <section class="portfolio-section" style="padding: 40px 0 80px;">
            <div class="container">
                <div class="portfolio-grid" id="portfolioGrid"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <span class="footer-copy">© 2026 PHOTOSYRNIK</span>
                <div class="footer-socials">
                    <a href="https://instagram.com/photosyrnik" target="_blank">Instagram</a>
                    <a href="https://t.me/dj_milena" target="_blank">Telegram</a>
                    <a href="mailto:photosyrnik@mail.ru">Email</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // ============================================================
        // ФОТО — ПРЯМЫЕ ССЫЛКИ (ГАРАНТИРОВАННО РАБОТАЮТ)
        // ============================================================
        const photos = [
            'https://raw.githubusercontent.com/ewterewa/photosyrniki/main/assets/images/portfolio/IMG_1347.jpeg',
            'https://raw.githubusercontent.com/ewterewa/photosyrniki/main/assets/images/portfolio/IMG_1348.jpeg',
            'https://raw.githubusercontent.com/ewterewa/photosyrniki/main/assets/images/portfolio/IMG_1349.jpeg'
        ];

        const grid = document.getElementById('portfolioGrid');

        if (photos.length === 0) {
            grid.innerHTML = `<div class="empty-portfolio"><p>🖼️ Портфолио пока пусто</p></div>`;
        } else {
            grid.innerHTML = photos.map(url => `
                <div class="portfolio-item">
                    <div class="portfolio-img" style="background-image: url('${url}');"></div>
                    <div class="portfolio-info">
                        <h3>Фото</h3>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
